# Multi-strategy configuration.
# Both strategies share: repo, droplet, UW, cron, logging.
# All orders/logs/telemetry are tagged with strategy_id.

# Fixed strategy capital partitioning (authoritative). No strategy may consume the other's capital.
capital_allocation:
  mode: fixed
  strategies:
    wheel:
      allocation_pct: 25
      min_free_cash_pct: 0
    equity:
      allocation_pct: 75
      min_free_cash_pct: 0

strategies:
  equity:
    enabled: false
    # Wheel-only mode: legacy equity run_once path disabled in main run_all_strategies.

  wheel:
    enabled: true
    universe_source: config/universe_wheel_expanded.yaml
    universe_max_candidates: 10
    universe_min_liquidity_volume: 3000000
    universe_min_open_interest: 5000
    universe_max_spread_pct: 0.005
    universe_min_iv_proxy: 0.15
    universe_excluded_sectors:
      - Technology
      - Communication Services
    # Per-position limits are a fraction of wheel budget (25% of account). Lower fraction = less single-name lockup.
    per_position_fraction_of_wheel_budget: 0.35  # max ~8.75% of account notional per CSP (0.35 * 25% slice)
    # max_positions is used only when max_concurrent_positions is 0/false; keep both aligned (see wheel_strategy max_pos).
    max_concurrent_positions: 12                 # was 5 and silently overrode max_positions; align with cap below
    max_positions: 12                            # cap open CSPs (room to learn and collect premiums)
    csp:
      target_dte_min: 5
      target_dte_max: 10
      delta_min: -0.3
      delta_max: -0.2
    cc:
      target_dte_min: 7
      target_dte_max: 21
      delta_min: 0.2
      delta_max: 0.3
    risk:
      max_positions_per_symbol: 2
      # No CSP opens when next earnings within this many calendar days (UW earnings endpoint).
      avoid_earnings_window_days: 21
      # Ex-dividend no-fly: skip CSP if ex-date within N calendar days (UW dividends; 0 disables).
      avoid_ex_dividend_days: 3
      # Max wheel CSP notional per sector as fraction of account equity (25% cap).
      max_sector_notional_fraction: 0.25
      # Require full cash collateral for each new CSP; block margin accounts unless allow_margin_account.
      require_cash_secured: true
      # Paper only: set true if Alpaca paper account uses multiplier>1 and you accept relaxed CSP collateral check.
      allow_margin_account: false
      # Skip CSP when daily RSI exceeds this (mean reversion: sell puts into support, not resistance). 0 disables.
      max_rsi_for_csp_entry: 70
      # IV Rank from UW must be >= this (0-100 scale).
      min_iv_rank: 50
      # Minimum put OI at the "wall" strike (UW oi-change) for institutional floor gate.
      put_wall_min_oi: 5000
      # Minimum premium credit per contract (limit * 100). Set 0 on paper while quotes are stubbed.
      min_credit_usd: 0
    velocity:
      enabled: true
      # Close short CSP when estimated premium captured >= this fraction of open credit.
      quick_exit_premium_capture: 0.90
      # Gamma shield: if hours to expiry <= this and capture >= gamma_shield_min_profit_capture, buy to close.
      gamma_shield_hours_to_expiry: 48
      gamma_shield_min_profit_capture: 0.80

promotion:
  min_score_to_promote: 75
  min_weeks_of_data: 4
  require_positive_realized_pnl: true
  require_drawdown_below: 0.10
  require_yield_consistency: true
